<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>升降法疲劳评估</title>
<style>
:root {
  --bg: #f5f7fb;
  --panel: #ffffff;
  --ink: #1f2937;
  --muted: #667085;
  --line: #d9e0ea;
  --accent: #1464a5;
  --accent-2: #0f8b8d;
  --good: #137a3f;
  --warn: #b45309;
  --bad: #b42318;
  --soft-good: #e9f7ef;
  --soft-warn: #fff4df;
  --soft-bad: #fdecec;
  --shadow: 0 10px 28px rgba(16, 24, 40, 0.08);
}
* { box-sizing: border-box; }
body {
  margin: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
  letter-spacing: 0;
}
header {
  background: #102a43;
  color: #fff;
  padding: 22px 30px;
  border-bottom: 5px solid var(--accent-2);
}
header h1 { margin: 0 0 6px; font-size: 24px; font-weight: 700; }
header p { margin: 0; color: #c9d6e2; font-size: 13px; }
main {
  width: min(1700px, calc(100vw - 24px));
  margin: 18px auto 36px;
  display: grid;
  grid-template-columns: minmax(320px, 390px) minmax(0, 1fr);
  gap: 12px;
}
section, .panel {
  background: var(--panel);
  border: 1px solid var(--line);
  box-shadow: var(--shadow);
  border-radius: 8px;
}
.left, .right { display: flex; flex-direction: column; gap: 16px; min-width: 0; }
.data-section { display: flex; flex-direction: column; min-height: 658px; }
.data-section .body { flex: 1; display: flex; min-height: 0; }
.data-section .table-wrap { flex: 1; max-height: none; }
.section-head {
  padding: 14px 16px 10px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
h2 { margin: 0; font-size: 16px; }
.body { padding: 14px 16px 16px; }
.grid { display: grid; gap: 12px; }
.params { grid-template-columns: repeat(2, minmax(0, 1fr)); }
label { display: grid; gap: 5px; color: var(--muted); font-size: 12px; font-weight: 700; }
input, select {
  width: 100%;
  min-height: 36px;
  padding: 7px 9px;
  border: 1px solid #cbd5e1;
  border-radius: 6px;
  background: #fff;
  color: var(--ink);
  font: inherit;
}
input[type="checkbox"] { width: 16px; min-height: 16px; }
.checkbox-row { display: flex; align-items: center; gap: 8px; min-height: 36px; color: var(--ink); }
.actions { display: flex; flex-wrap: wrap; gap: 8px; }
button {
  border: 1px solid #b8c4d3;
  background: #fff;
  color: var(--ink);
  min-height: 36px;
  padding: 8px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-weight: 700;
}
button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
button.secondary { background: #eef6fb; border-color: #bdd7e8; color: #0f4f7a; }
button.danger { color: var(--bad); border-color: #f0b8b4; }
button:hover { filter: brightness(0.98); }
button:disabled { cursor: not-allowed; opacity: 0.55; }
.table-wrap { overflow: auto; border: 1px solid var(--line); border-radius: 6px; max-height: 440px; }
table { width: 100%; border-collapse: collapse; background: #fff; }
th, td { border-bottom: 1px solid #e6ebf2; padding: 7px 8px; text-align: left; font-size: 13px; vertical-align: middle; }
th { position: sticky; top: 0; background: #f8fafc; color: #475467; z-index: 1; }
td input { min-height: 30px; padding: 4px 6px; }
td.row-tools { width: 48px; text-align: center; }
.table-wrap th:nth-child(1), .table-wrap td:nth-child(1) { width: 58px; }
.table-wrap th:nth-child(2), .table-wrap td:nth-child(2) { min-width: 132px; }
.table-wrap th:nth-child(3), .table-wrap td:nth-child(3) { min-width: 112px; }
.table-wrap td select { min-height: 30px; padding: 4px 6px; }
.mini { padding: 5px 8px; min-height: 28px; font-size: 12px; }
.summary-grid {
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: 7px;
}
.stat {
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 8px 9px;
  background: #fbfcfe;
  min-height: 60px;
}
.stat .label { font-size: 11px; color: var(--muted); margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.stat .value { font-size: 16px; font-weight: 800; color: #172033; white-space: nowrap; overflow: visible; text-overflow: clip; }
.badge {
  display: inline-flex;
  align-items: center;
  min-height: 24px;
  padding: 3px 8px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 800;
  border: 1px solid var(--line);
}
.badge.good { background: var(--soft-good); color: var(--good); border-color: #b7e3c8; }
.badge.warn { background: var(--soft-warn); color: var(--warn); border-color: #f2d298; }
.badge.bad { background: var(--soft-bad); color: var(--bad); border-color: #f4b7b2; }
.notes { display: grid; gap: 8px; }
.note {
  border-left: 4px solid var(--warn);
  background: #fffaf0;
  padding: 9px 10px;
  font-size: 13px;
  color: #5f3b00;
}
.empty { color: var(--muted); font-size: 13px; }
.chart-box { padding: 12px; }
canvas { width: 100%; max-width: 100%; border: 1px solid var(--line); border-radius: 6px; background: #fff; }
.method-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 12px;
}
.method-card {
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 12px;
  background: #fff;
  display: grid;
  gap: 8px;
}
.method-card h3 { margin: 0; font-size: 15px; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
.kv { display: grid; grid-template-columns: 120px minmax(0, 1fr); gap: 6px 8px; font-size: 13px; }
.kv span:nth-child(odd) { color: var(--muted); }
.kv span:nth-child(even) { font-weight: 700; overflow-wrap: anywhere; }
.wide { grid-column: 1 / -1; }
.footer-row {
  padding: 12px 16px;
  border-top: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  color: var(--muted);
  font-size: 12px;
}
@media (max-width: 1100px) {
  main { grid-template-columns: 1fr; }
  .summary-grid { grid-template-columns: repeat(5, minmax(0, 1fr)); }
  .method-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .data-section { display: block; min-height: auto; }
  .data-section .body { display: block; }
  .data-section .table-wrap { max-height: 440px; }
}
@media (max-width: 680px) {
  main { width: calc(100vw - 18px); }
  .params, .method-grid { grid-template-columns: 1fr; }
  .summary-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  header { padding: 18px; }
}
@media print {
  body { background: #fff; }
  header, .left, .footer-row button { display: none !important; }
  main { display: block; width: auto; margin: 0; }
  section { box-shadow: none; break-inside: avoid; }
}
</style>
</head>
<body>
<header>
  <h1>升降法疲劳评估</h1>
  <p>纯前端离线工具：手工录入试验序列，计算 Dixon-Mood、MLE、高振同配对法与 Bootstrap 区间，并导出 Word 报告。</p>
</header>
<main>
  <div class="left">
    <section class="data-section">
      <div class="section-head">
        <h2>试验数据</h2>
        <div class="actions">
          <button class="mini secondary" id="sampleBtn">示例</button>
          <button class="mini" id="addRowBtn">加行</button>
          <button class="mini danger" id="clearRowsBtn">清空</button>
        </div>
      </div>
      <div class="body">
        <div class="table-wrap">
          <table>
            <thead><tr><th style="width:70px;">序号</th><th id="loadHeader">载荷/应力 (kN)</th><th>结果</th><th style="width:48px;"></th></tr></thead>
            <tbody id="dataBody"></tbody>
          </table>
        </div>
      </div>
    </section>
    <section>
      <div class="section-head"><h2>分析参数</h2></div>
      <div class="body grid params">
        <label>单位<select id="unitInput"><option value="kN">kN</option><option value="MPa">MPa</option><option value="Nm">Nm</option><option value="无量纲">无量纲</option></select></label>
        <label>步长 d（留空自动推断）<input id="stepInput" type="number" step="any" placeholder="自动"></label>
        <label>显著性 alpha<input id="alphaInput" type="number" step="0.01" min="0.001" max="0.5" value="0.05"></label>
        <label>Bootstrap 次数<input id="bootInput" type="number" min="50" max="20000" step="50" value="3000"></label>
        <label>MLE Bootstrap 次数<input id="mleBootInput" type="number" min="20" max="5000" step="10" value="120"></label>
        <label>随机种子<input id="seedInput" type="number" step="1" value="20260624"></label>
        <label>Gao 闭合要求<span class="checkbox-row"><input id="closedInput" type="checkbox" checked> 要求闭合才判定正式有效</span></label>
      </div>
      <div class="footer-row">
        <span id="statusText">等待分析</span>
        <div class="actions">
          <button id="testBtn">自检</button>
          <button class="primary" id="analyzeBtn">计算评估</button>
          <button id="exportBtn" disabled>导出 Word</button>
          <button id="pdfBtn" disabled>导出 PDF</button>
        </div>
      </div>
    </section>
  </div>
  <div class="right">
    <section>
      <div class="section-head"><h2>结果总览</h2><span id="validBadge" class="badge warn">未计算</span></div>
      <div class="body summary-grid" id="summaryGrid"></div>
    </section>
    <section>
      <div class="section-head"><h2>升降过程图</h2></div>
      <div class="chart-box"><canvas id="chartCanvas" width="980" height="430"></canvas></div>
    </section>
    <section>
      <div class="section-head"><h2>方法结果</h2></div>
      <div class="body method-grid" id="methodsGrid"></div>
    </section>
    <section>
      <div class="section-head"><h2>校验说明</h2></div>
      <div class="body notes" id="notesBox"><div class="empty">计算后显示数据校验与工程解释。</div></div>
    </section>
  </div>
</main>

<script>
"use strict";

const GAO_PAIRED_CV_TABLE = [
  [0.0000, 0.0201, 3], [0.0201, 0.0314, 4], [0.0314, 0.0403, 5],
  [0.0403, 0.0476, 6], [0.0476, 0.0541, 7], [0.0541, 0.0598, 8],
  [0.0598, 0.0650, 9], [0.0650, 0.0699, 10], [0.0699, 0.0744, 11],
  [0.0744, 0.0787, 12], [0.0787, 0.0827, 13], [0.0827, 0.0866, 14],
  [0.0866, 0.0903, 15]
];
const PASS_VALUES = new Set(["o", "O", "通过", "合格", "未失效", "pass", "passed", "survival", "survive", "runout", "0"]);
const FAIL_VALUES = new Set(["x", "X", "×", "失效", "失败", "断裂", "fail", "failed", "failure", "broken", "1"]);
let currentAnalysis = null;

function $(id) { return document.getElementById(id); }
function fmt(value, digits = 3) {
  return Number.isFinite(value) ? Number(value).toFixed(digits).replace(/\.?0+$/, "") : "-";
}
function fmtCi(ci) { return ci && Number.isFinite(ci[0]) && Number.isFinite(ci[1]) ? `[${fmt(ci[0])}, ${fmt(ci[1])}]` : "-"; }
function unitSuffix(unit) { return unit && unit !== "无量纲" ? ` ${unit}` : ""; }
function fmtUnit(value, unit, digits = 3) { return Number.isFinite(value) ? `${fmt(value, digits)}${unitSuffix(unit)}` : "-"; }
function fmtCiUnit(ci, unit) { return ci && Number.isFinite(ci[0]) && Number.isFinite(ci[1]) ? `[${fmtUnit(ci[0], unit)}, ${fmtUnit(ci[1], unit)}]` : "-"; }
function loadLabel(unit) { return unit && unit !== "无量纲" ? `载荷/应力 (${unit})` : "载荷/应力 (无量纲)"; }
function mean(arr) { return arr.reduce((a, b) => a + b, 0) / arr.length; }
function sampleStd(arr) {
  if (arr.length < 2) return NaN;
  const m = mean(arr);
  return Math.sqrt(arr.reduce((s, x) => s + (x - m) ** 2, 0) / (arr.length - 1));
}
function percentile(values, p) {
  const arr = values.filter(Number.isFinite).sort((a, b) => a - b);
  if (arr.length < 10) return NaN;
  const pos = (arr.length - 1) * p;
  const lo = Math.floor(pos), hi = Math.ceil(pos);
  if (lo === hi) return arr[lo];
  return arr[lo] * (hi - pos) + arr[hi] * (pos - lo);
}
function percentileCi(values, alpha) { return [percentile(values, alpha / 2), percentile(values, 1 - alpha / 2)]; }
function almostEqual(a, b, eps = 1e-9) { return Math.abs(a - b) <= eps * Math.max(1, Math.abs(a), Math.abs(b)); }

function erf(x) {
  const sign = x < 0 ? -1 : 1;
  x = Math.abs(x);
  const a1 = 0.254829592, a2 = -0.284496736, a3 = 1.421413741, a4 = -1.453152027, a5 = 1.061405429, p = 0.3275911;
  const t = 1 / (1 + p * x);
  const y = 1 - (((((a5 * t + a4) * t) + a3) * t + a2) * t + a1) * t * Math.exp(-x * x);
  return sign * y;
}
function normCdf(x) { return 0.5 * (1 + erf(x / Math.SQRT2)); }
function normalPpf(p) {
  if (p <= 0 || p >= 1) return NaN;
  const a = [-39.6968302866538, 220.946098424521, -275.928510446969, 138.357751867269, -30.6647980661472, 2.50662827745924];
  const b = [-54.4760987982241, 161.585836858041, -155.698979859887, 66.8013118877197, -13.2806815528857];
  const c = [-0.00778489400243029, -0.322396458041136, -2.40075827716184, -2.54973253934373, 4.37466414146497, 2.93816398269878];
  const d = [0.00778469570904146, 0.32246712907004, 2.445134137143, 3.75440866190742];
  const plow = 0.02425, phigh = 1 - plow;
  let q, r;
  if (p < plow) {
    q = Math.sqrt(-2 * Math.log(p));
    return (((((c[0] * q + c[1]) * q + c[2]) * q + c[3]) * q + c[4]) * q + c[5]) /
      ((((d[0] * q + d[1]) * q + d[2]) * q + d[3]) * q + 1);
  }
  if (p > phigh) {
    q = Math.sqrt(-2 * Math.log(1 - p));
    return -(((((c[0] * q + c[1]) * q + c[2]) * q + c[3]) * q + c[4]) * q + c[5]) /
      ((((d[0] * q + d[1]) * q + d[2]) * q + d[3]) * q + 1);
  }
  q = p - 0.5; r = q * q;
  return (((((a[0] * r + a[1]) * r + a[2]) * r + a[3]) * r + a[4]) * r + a[5]) * q /
    (((((b[0] * r + b[1]) * r + b[2]) * r + b[3]) * r + b[4]) * r + 1);
}
function tPpfApprox(p, df) {
  const z = normalPpf(p);
  if (!Number.isFinite(z) || df <= 0) return NaN;
  return z + (z ** 3 + z) / (4 * df) + (5 * z ** 5 + 16 * z ** 3 + 3 * z) / (96 * df ** 2);
}
function chi2PpfApprox(p, df) {
  const z = normalPpf(p);
  if (!Number.isFinite(z) || df <= 0) return NaN;
  return df * (1 - 2 / (9 * df) + z * Math.sqrt(2 / (9 * df))) ** 3;
}
function createRng(seed) {
  let state = (Number(seed) >>> 0) || 1;
  return function rng() {
    state = (1664525 * state + 1013904223) >>> 0;
    return state / 4294967296;
  };
}

function normalizeResponse(value) {
  const raw = String(value ?? "").trim();
  if (PASS_VALUES.has(raw)) return false;
  if (FAIL_VALUES.has(raw)) return true;
  const lower = raw.toLowerCase();
  if (PASS_VALUES.has(lower)) return false;
  if (FAIL_VALUES.has(lower)) return true;
  throw new Error(`无法识别结果: ${raw || "(空)"}`);
}
function gaoRequiredPairsFromCv(cv) {
  if (!Number.isFinite(cv) || cv < 0) return null;
  for (const [, high, nPairs] of GAO_PAIRED_CV_TABLE) if (cv < high) return nPairs;
  return null;
}
function inferStep(loads) {
  const diffs = [];
  for (let i = 1; i < loads.length; i++) {
    const diff = Math.abs(loads[i] - loads[i - 1]);
    if (diff > 1e-12) diffs.push(diff);
  }
  if (!diffs.length) throw new Error("无法自动推断步长：相邻载荷没有非零变化。");
  const counts = new Map();
  for (const d of diffs) {
    const key = String(Math.round(d * 1e9) / 1e9);
    counts.set(key, (counts.get(key) || 0) + 1);
  }
  let bestKey = null, bestCount = -1;
  for (const [key, count] of counts.entries()) {
    if (count > bestCount || (count === bestCount && Number(key) < Number(bestKey))) {
      bestKey = key; bestCount = count;
    }
  }
  return Number(bestKey);
}
function validateSequence(loads, responses, d) {
  const notes = [];
  if (loads.length < 2) notes.push("有效数据少于 2 行，无法形成升降序列。");
  const nFail = responses.filter(Boolean).length;
  if (nFail === 0) notes.push("全部结果均为通过，Dixon-Mood、MLE 和 Gao 配对估计通常无效。");
  if (nFail === responses.length) notes.push("全部结果均为失效，Dixon-Mood、MLE 和 Gao 配对估计通常无效。");
  for (let i = 1; i < loads.length; i++) {
    const diff = Math.abs(loads[i] - loads[i - 1]);
    if (diff > 1e-12) {
      const ratio = diff / d;
      if (!almostEqual(ratio, Math.round(ratio), 1e-6)) {
        notes.push(`第 ${i} 到 ${i + 1} 点载荷差 ${fmt(diff)} 不是步长 ${fmt(d)} 的整数倍。`);
      }
    }
  }
  for (let i = 0; i < responses.length - 1; i++) {
    const expected = responses[i] ? loads[i] - d : loads[i] + d;
    if (!almostEqual(loads[i + 1], expected, 1e-6)) {
      notes.push(`第 ${i + 1} 点后续载荷不符合标准升降路径：期望约 ${fmt(expected)}，实际 ${fmt(loads[i + 1])}。`);
    }
  }
  return notes;
}

function dixonMoodEstimate(loads, responses, d) {
  const nFail = responses.filter(Boolean).length;
  const nPass = loads.length - nFail;
  const useFail = nFail <= nPass;
  const k = useFail ? nFail : nPass;
  if (k === 0) return { meanHat: NaN, stdHat: NaN, valid: false, group: "none", frequencyRows: [] };
  const events = loads.filter((_, i) => responses[i] === useFail);
  const uniqueLoads = Array.from(new Set(loads)).sort((a, b) => a - b);
  const loadToIdx = new Map(uniqueLoads.map((v, i) => [String(v), i]));
  const indices = events.map(v => loadToIdx.get(String(v)));
  const base = Math.min(...indices);
  const shifted = indices.map(i => i - base);
  const n = k;
  const A = shifted.reduce((s, x) => s + x, 0);
  const B = shifted.reduce((s, x) => s + x * x, 0);
  const sign = useFail ? -0.5 : 0.5;
  const meanHat = Math.min(...events) + d * (A / n + sign);
  const numerator = Math.max(n * B - A * A, 0);
  let stdHat = n > 0 ? d * Math.sqrt(numerator) / n : NaN;
  const correction = {2: 0.500, 3: 0.748, 4: 0.862, 5: 0.916, 6: 0.947, 7: 0.967, 8: 0.979, 9: 0.987, 10: 0.991, 11: 0.994, 12: 0.996, 13: 0.997, 14: 0.998, 15: 0.998};
  if (correction[n]) stdHat /= correction[n];
  const counts = new Map();
  indices.forEach(idx => counts.set(idx, (counts.get(idx) || 0) + 1));
  const frequencyRows = Array.from(counts.entries()).sort((a, b) => a[0] - b[0]).map(([idx, frequency]) => ({
    levelIndex: idx, load: uniqueLoads[idx], frequency, i: idx - base,
    iN: (idx - base) * frequency, i2N: (idx - base) ** 2 * frequency
  }));
  return { meanHat, stdHat, valid: Number.isFinite(stdHat) && stdHat > 0, group: useFail ? "失效组" : "通过组", N: n, A, B, frequencyRows };
}
function logLikelihood(mu, sigma, loads, responses) {
  if (sigma <= 0) return -1e100;
  let ll = 0;
  for (let i = 0; i < loads.length; i++) {
    const p = Math.min(1 - 1e-15, Math.max(1e-15, normCdf((loads[i] - mu) / sigma)));
    ll += responses[i] ? Math.log(p) : Math.log(1 - p);
  }
  return ll;
}
function mleEstimate(loads, responses, d, gridSize = 100) {
  const dm = dixonMoodEstimate(loads, responses, d);
  if (!dm.valid) return { meanHat: NaN, stdHat: NaN, valid: false, logLikelihood: NaN };
  const muCenter = dm.meanHat;
  let sigmaCenter = dm.stdHat > 0 ? dm.stdHat : d;
  if (sigmaCenter <= 0 || sigmaCenter > 10 * d) sigmaCenter = d * 1.5;
  const muRange = Math.max(3 * sigmaCenter, 2 * d);
  const sigmaMin = Math.max(0.05 * d, 0.1 * sigmaCenter);
  const sigmaMax = Math.max(sigmaCenter + Math.max(0.8 * sigmaCenter, 0.5 * d), 2 * d);
  let best = [muCenter, sigmaCenter, -1e100];
  const scan = (muLo, muHi, muN, sigmaLo, sigmaHi, sigmaN) => {
    for (let mi = 0; mi < muN; mi++) {
      const mu = muLo + (muHi - muLo) * mi / Math.max(1, muN - 1);

function runSelfTests() {
  const assert = (cond, msg) => { if (!cond) throw new Error(msg); };
  assert(gaoRequiredPairsFromCv(4.517 / 103.0) === 6, "Gao CV 查表失败");
  assert(gaoRequiredPairsFromCv(0.0200) === 3, "Gao CV 边界 0.0200 失败");
  assert(gaoRequiredPairsFromCv(0.0201) === 4, "Gao CV 边界 0.0201 失败");
  let loads = [110, 105, 100, 105, 100], responses = [true, true, false, true, false];
  let est = pairedUpdownEstimate(loads, responses, 5, true);
  assert(est.startIndex === 1 && est.closed === true && est.nPairs === 2, "基础配对闭合样例失败");
  assert(est.pairValues.every(v => almostEqual(v, 102.5)), "基础配对中点失败");
  assert(est.valid === false, "零标准差应无效");
  loads = [110, 105, 100, 105]; responses = [true, true, false, false];
  est = pairedUpdownEstimate(loads, responses, 5, true);
  assert(est.closed === false && est.nPairs === 2 && est.retrospectivePairs === 1, "回溯配对开放样例失败");
  assert(JSON.stringify(est.pairIndices) === JSON.stringify([[1, 2], [0, 3]]), "回溯配对索引失败");
  loads = [110, 105, 100, 105, 110]; responses = [true, true, false, false, true];
  est = pairedUpdownEstimate(loads, responses, 5, true);
  assert(est.closed === true && JSON.stringify(est.unmatchedIndices) === JSON.stringify([4]), "回溯闭合未配对样例失败");
  const oneSide = dixonMoodEstimate([100, 105, 110], [false, false, false], 5);
  assert(oneSide.valid === false, "单一响应组 Dixon 应无效");
  return "自检通过：Gao 查表、闭合、回溯配对、单一响应组等基准场景均符合预期。";
}
